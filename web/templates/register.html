<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cricket Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1d4ed8;
            --card-bg: rgba(255, 255, 255, 0.12);
            --card-border: rgba(255, 255, 255, 0.22);
            --text-soft: rgba(255, 255, 255, 0.78);
            --accent: #f97316;
            --accent-dark: #ea580c;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(249, 115, 22, 0.28), transparent 34%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.2), transparent 30%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-shell {
            width: 100%;
            max-width: 440px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(18px);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
            padding: 32px;
        }

        .brand-badge {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f97316, #fb7185);
            display: grid;
            place-items: center;
            color: white;
            font-size: 28px;
            margin: 0 auto 18px;
        }

        .heading {
            color: white;
            text-align: center;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subheading {
            color: var(--text-soft);
            text-align: center;
            margin-bottom: 28px;
        }

        .form-label {
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 14px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.52);
        }

        .form-control:focus {
            color: white;
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 0 0 0.25rem rgba(249, 115, 22, 0.18);
        }

        .btn-auth {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 16px 30px rgba(249, 115, 22, 0.28);
        }

        .btn-auth:hover {
            color: white;
            transform: translateY(-1px);
        }

        .bottom-copy {
            color: var(--text-soft);
            text-align: center;
            margin-top: 22px;
        }

        .bottom-copy a {
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="brand-badge">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 class="heading">Create your account</h1>
            <p class="subheading">Sign up to explore the women's cricket analytics dashboard.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} mb-3" role="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label for="name" class="form-label">Full name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create a secure password" required>
                </div>
                <button type="submit" class="btn btn-auth">Create Account</button>
            </form>

            <p class="bottom-copy">Already registered? <a href="{{ url_for('login') }}">Log in</a></p>
        </div>
    </div>
</body>
</html>
